name: CI

on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          # go.mod's `go` directive is forced ahead by transitive deps
          # (testcontainers-go et al.), often past whatever Go version the
          # latest golangci-lint release binary was itself built with -
          # goinstall builds golangci-lint from source with the toolchain
          # this job already has (see setup-go above), sidestepping that
          # binary-vs-go.mod version mismatch entirely.
          install-mode: goinstall
